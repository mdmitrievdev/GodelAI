name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint → build → test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (restore → build → test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore PRReviewAssistant.sln

      - name: Build
        run: dotnet build PRReviewAssistant.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test PRReviewAssistant.sln
          --no-build
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/TestResults/
          retention-days: 7

  # ── Docker ─────────────────────────────────────────────────────────────────
  docker:
    name: Docker (compose build → up → health check)
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    env:
      POSTGRES_DB: pr_review_assistant
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: ci_password
      POSTGRES_PORT: 5432
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      USE_MOCK_AI: 'true'
      VITE_API_BASE_URL: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build --no-cache

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker compose ps backend --format json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend is healthy."
              break
            fi
            echo "Attempt $i: status='$STATUS', retrying in 5s..."
            sleep 5
          done

      - name: Wait for frontend health
        run: |
          echo "Waiting for frontend to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker compose ps frontend --format json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "healthy" ]; then
              echo "Frontend is healthy."
              break
            fi
            echo "Attempt $i: status='$STATUS', retrying in 5s..."
            sleep 5
          done

      - name: Health check — backend /health
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8080/health

      - name: Health check — frontend /
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:3000/

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
